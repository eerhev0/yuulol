<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>21是🔥货~</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  font-family:system-ui,sans-serif;
  font-weight:bold;
  overflow-x:hidden;
  padding:10px;
}
.text{
  font-size:22px;
  white-space:nowrap;
  margin:2px 0;
}
</style>
</head>
<body>
<div id="box"></div>

<script>
const box = document.getElementById('box');
// 超多鲜艳颜色
const colors = [
  '#ff3333','#ff9900','#ffff00','#00ff00',
  '#00ffff','#3399ff','#9933ff','#ff33cc',
  '#ff6600','#ff0066','#66ff66','#00ccff',
  '#ff5555','#ffbb00','#77ff77','#ff77ff'
];

function add(){
  let div = document.createElement('div');
  div.className = 'text';
  // 随机颜色
  let color = colors[Math.floor(Math.random()*colors.length)];
  div.style.color = color;
  div.textContent = '21是🔥货~';
  box.appendChild(div);
  // 自动滚到底
  window.scrollTo(0,document.body.scrollHeight);
}

// 超快刷屏
setInterval(add, 30);
</script>
</body>
</html>
